<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MoodBite AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create Account 🌟</h1>
            <p>Join MoodBite AI today.</p>
        </div>
        <form id="signup-form">
            <div class="input-group">
                <label for="signup-name">Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe">
            </div>
            <div class="input-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" required placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="••••••••">
            </div>
            <p id="signup-error" class="error-msg"></p>
            <button type="submit" class="btn btn-primary btn-large">Sign Up</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
